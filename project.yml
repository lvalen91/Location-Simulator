name: LocationSimulator2
options:
  bundleIdPrefix: com.locationsimulator
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  LocationSimulator2:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.locationsimulator.LocationSimulator2
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/LocationSimulator2.entitlements
        PRODUCT_NAME: "Location Simulator"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Resources/LocationSimulator2.entitlements
